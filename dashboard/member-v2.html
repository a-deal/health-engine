<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>baseline.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --border: #e8e5dd;
  --text: #1a1a18;
  --text-secondary: #4a4a44;
  --text-muted: #8a8a80;
  --green: #2d6a4f;
  --green-light: rgba(45, 106, 79, 0.08);
  --accent: #c17817;
  --accent-light: rgba(193, 120, 23, 0.08);
  --coral: #b84233;
  --coral-light: rgba(184, 66, 51, 0.08);
  --purple: #7B4B9B;
  --purple-light: rgba(123, 75, 155, 0.08);
  --font: 'Inter', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  padding: 0 0 80px;
}

.page { max-width: 480px; margin: 0 auto; padding: 0 20px; }

/* ── Header ── */
.header {
  padding: 40px 0 8px;
  display: flex;
  align-items: baseline;
  justify-content: space-between;
}
.header .logo {
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--text-muted);
  letter-spacing: -0.5px;
}
.header .logo span { color: var(--accent); }
.header .date {
  font-size: 0.75rem;
  color: var(--text-muted);
  font-weight: 500;
}

/* ── Outcome badge ── */
.outcome-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--green);
  background: var(--green-light);
  padding: 6px 14px;
  border-radius: 20px;
  margin: 16px 0 24px;
}

/* ── Progress hero ── */
.progress-hero {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px 24px 20px;
  margin-bottom: 16px;
}

.progress-hero .headline {
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  margin-bottom: 16px;
}

.progress-stats {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  margin-bottom: 20px;
}

.progress-main .number {
  font-family: var(--mono);
  font-size: 2.4rem;
  font-weight: 500;
  color: var(--text);
  line-height: 1;
}
.progress-main .unit {
  font-size: 0.85rem;
  color: var(--text-muted);
  font-weight: 400;
}
.progress-main .label {
  font-size: 0.75rem;
  color: var(--text-muted);
  margin-top: 4px;
}

.progress-side {
  text-align: right;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.progress-side .stat {
  line-height: 1.2;
}
.progress-side .stat .val {
  font-family: var(--mono);
  font-size: 1.1rem;
  font-weight: 500;
  color: var(--text);
}
.progress-side .stat .lbl {
  font-size: 0.68rem;
  color: var(--text-muted);
}

/* ── Weight chart ── */
.chart-wrap {
  position: relative;
  height: 100px;
  margin-top: 8px;
}
.chart-wrap svg {
  width: 100%;
  height: 100%;
}

/* ── Coach signal ── */
.coach-signal {
  background: var(--purple-light);
  border: 1px solid rgba(123, 75, 155, 0.15);
  border-radius: 16px;
  padding: 18px 20px;
  margin-bottom: 20px;
  display: flex;
  gap: 14px;
  align-items: flex-start;
}
.coach-signal.severity-warning {
  background: var(--accent-light);
  border-color: rgba(193, 120, 23, 0.15);
}
.coach-signal.severity-critical {
  background: var(--coral-light);
  border-color: rgba(184, 66, 51, 0.15);
}
.coach-signal.severity-positive {
  background: var(--green-light);
  border-color: rgba(45, 106, 79, 0.15);
}
.coach-signal .icon {
  font-size: 1.1rem;
  flex-shrink: 0;
  margin-top: 1px;
}
.coach-signal .content {
  font-size: 0.88rem;
  line-height: 1.55;
  color: var(--text-secondary);
}
.coach-signal .content strong {
  color: var(--text);
  font-weight: 600;
}

/* ── Section ── */
.section { margin-bottom: 20px; }

.section-header {
  font-size: 0.72rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  margin-bottom: 10px;
  padding: 0 2px;
}

/* ── Nutrition card ── */
.nutrition-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 22px 20px;
}

.protein-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}
.protein-row .label {
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-secondary);
}
.protein-row .value {
  font-family: var(--mono);
  font-size: 0.88rem;
  color: var(--text);
}

.protein-bar {
  height: 10px;
  background: #eae8e3;
  border-radius: 5px;
  overflow: hidden;
  margin-bottom: 16px;
}
.protein-bar-fill {
  height: 100%;
  border-radius: 5px;
  transition: width 0.8s ease;
}

.macro-row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
  text-align: center;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}
.macro-row .val {
  font-family: var(--mono);
  font-size: 1rem;
  font-weight: 500;
  color: var(--text);
}
.macro-row .lbl {
  font-size: 0.68rem;
  color: var(--text-muted);
  margin-top: 2px;
}

.meals-list {
  list-style: none;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}
.meals-list li {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  font-size: 0.82rem;
  color: var(--text-secondary);
}
.meals-list li .p {
  font-family: var(--mono);
  font-size: 0.78rem;
  color: var(--text-muted);
}

/* ── Recovery grid ── */
.recovery-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
}
.recovery-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px 14px;
  text-align: center;
}
.recovery-card .label {
  font-size: 0.68rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  color: var(--text-muted);
  margin-bottom: 8px;
}
.recovery-card .value {
  font-family: var(--mono);
  font-size: 1.4rem;
  font-weight: 500;
  color: var(--text);
  line-height: 1;
}
.recovery-card .unit {
  font-size: 0.68rem;
  color: var(--text-muted);
}
.recovery-card .trend {
  font-family: var(--mono);
  font-size: 0.68rem;
  margin-top: 6px;
}
.trend-good { color: var(--green); }
.trend-warn { color: var(--accent); }
.trend-bad { color: var(--coral); }

.recovery-card .spark { margin-top: 8px; }

/* ── More sections toggle ── */
.more-toggle {
  text-align: center;
  padding: 16px;
}
.more-toggle button {
  background: none;
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 24px;
  font-family: var(--font);
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
}
.more-toggle button:hover {
  background: var(--surface);
  border-color: var(--text-muted);
}

.more-sections { display: none; }
.more-sections.visible { display: block; }

/* ── Labs ── */
.labs-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
}
.labs-card summary {
  padding: 16px 20px;
  cursor: pointer;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-secondary);
  list-style: none;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.labs-card summary::-webkit-details-marker { display: none; }
.labs-card summary::after {
  content: '+';
  font-family: var(--mono);
  font-size: 1rem;
  color: var(--text-muted);
}
.labs-card[open] summary::after { content: '\2212'; }

.labs-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.82rem;
}
.labs-table th {
  text-align: left;
  padding: 8px 20px;
  font-weight: 500;
  color: var(--text-muted);
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  border-bottom: 1px solid var(--border);
}
.labs-table td {
  padding: 10px 20px;
  border-bottom: 1px solid var(--border);
  color: var(--text-secondary);
}
.labs-table tr:last-child td { border-bottom: none; }
.lab-value {
  font-family: var(--mono);
  font-size: 0.82rem;
  color: var(--text);
}
.zone-badge {
  display: inline-block;
  font-family: var(--mono);
  font-size: 0.62rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.zone-optimal { color: var(--green); background: var(--green-light); }
.zone-healthy { color: var(--text-secondary); background: #eae8e3; }
.zone-borderline { color: var(--accent); background: var(--accent-light); }
.zone-elevated { color: var(--coral); background: var(--coral-light); }

/* ── Coverage ── */
.coverage-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  display: flex;
  align-items: center;
  gap: 20px;
}
.coverage-ring { position: relative; width: 72px; height: 72px; flex-shrink: 0; }
.coverage-ring .ring-num {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: var(--mono);
  font-size: 1.1rem;
  font-weight: 500;
  color: var(--text);
}
.coverage-text { font-size: 0.82rem; color: var(--text-secondary); line-height: 1.5; }
.coverage-text strong { color: var(--text); font-weight: 600; }

/* ── Empty state ── */
.empty-state {
  text-align: center;
  padding: 48px 24px;
  color: var(--text-muted);
  font-size: 0.9rem;
}
.empty-state .cta {
  margin-top: 16px;
  font-size: 0.82rem;
  color: var(--text-secondary);
}

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.anim { animation: fadeUp 0.35s ease both; }

@media (max-width: 380px) {
  .recovery-grid { grid-template-columns: 1fr; }
  .progress-stats { flex-direction: column; gap: 16px; }
  .progress-side { text-align: left; flex-direction: row; gap: 20px; }
}
</style>
</head>
<body>

<div class="page">
  <div class="header">
    <div class="logo">baseline<span>.</span></div>
    <div class="date" id="date-display"></div>
  </div>

  <div id="outcome-badge"></div>
  <div id="progress-hero"></div>
  <div id="coach-signal"></div>
  <div id="primary-section"></div>
  <div id="secondary-section"></div>

  <div class="more-toggle" id="more-toggle" style="display:none;">
    <button onclick="toggleMore()">See full picture</button>
  </div>

  <div class="more-sections" id="more-sections">
    <div id="tertiary-section"></div>
    <div id="labs-section"></div>
    <div id="coverage-section"></div>
  </div>

  <div id="error-display"></div>
</div>

<script>
const OUTCOME_CONFIG = {
  'lose-weight': {
    label: 'Body composition',
    icon: '\u2193',
    primary: 'nutrition',
    secondary: 'recovery',
    tertiary: 'labs'
  },
  'build-strength': {
    label: 'Getting stronger',
    icon: '\u2191',
    primary: 'recovery',
    secondary: 'nutrition',
    tertiary: 'labs'
  },
  'sleep-better': {
    label: 'Better sleep',
    icon: '\u263E',
    primary: 'recovery',
    secondary: 'nutrition',
    tertiary: 'labs'
  },
  'more-energy': {
    label: 'More energy',
    icon: '\u26A1',
    primary: 'recovery',
    secondary: 'nutrition',
    tertiary: 'labs'
  },
  'eat-healthier': {
    label: 'Eating better',
    icon: '\u2713',
    primary: 'nutrition',
    secondary: 'recovery',
    tertiary: 'labs'
  },
  'less-stress': {
    label: 'Less stress',
    icon: '\u25CB',
    primary: 'recovery',
    secondary: 'nutrition',
    tertiary: 'labs'
  },
  'sharper-focus': {
    label: 'Sharper focus',
    icon: '\u25CE',
    primary: 'recovery',
    secondary: 'nutrition',
    tertiary: 'labs'
  },
  'better-mood': {
    label: 'Better mood',
    icon: '\u2600',
    primary: 'recovery',
    secondary: 'nutrition',
    tertiary: 'labs'
  }
};

function formatDate(s) {
  return new Date(s + 'T00:00:00').toLocaleDateString('en-US', {
    weekday: 'short', month: 'short', day: 'numeric'
  });
}

function renderOutcomeBadge(outcome) {
  const cfg = OUTCOME_CONFIG[outcome] || { label: outcome, icon: '\u2022' };
  document.getElementById('outcome-badge').innerHTML =
    `<div class="outcome-badge anim">${cfg.icon} Focused on: ${cfg.label}</div>`;
}

function renderProgressHero(weight, outcome) {
  const el = document.getElementById('progress-hero');
  if (outcome !== 'lose-weight' && outcome !== 'build-strength') {
    // For non-weight outcomes, show a simpler hero or skip
    return;
  }
  if (!weight || !weight.current) return;

  const start = weight.start_weight || 203;
  const current = weight.current;
  const target = weight.target || 188;
  const totalToLose = start - target;
  const lost = start - current;
  const pctDone = Math.min(100, Math.max(0, (lost / totalToLose) * 100));
  const remaining = weight.remaining || (current - target);
  const projected = weight.projected_date;

  el.innerHTML = `
    <div class="progress-hero anim">
      <div class="headline">Your journey</div>
      <div class="progress-stats">
        <div class="progress-main">
          <div class="number">${lost.toFixed(1)}<span class="unit"> lbs</span></div>
          <div class="label">lost since Jan 25</div>
        </div>
        <div class="progress-side">
          <div class="stat">
            <div class="val">${remaining.toFixed(1)}</div>
            <div class="lbl">lbs to go</div>
          </div>
          <div class="stat">
            <div class="val">${pctDone.toFixed(0)}%</div>
            <div class="lbl">of the way</div>
          </div>
        </div>
      </div>
      <div class="chart-wrap" id="weight-chart"></div>
    </div>
  `;
}

function renderWeightChart(weightHistory, target) {
  const container = document.getElementById('weight-chart');
  if (!container || !weightHistory || weightHistory.length < 3) return;

  const vals = weightHistory.map(d => d.weight);
  const min = Math.min(target || Math.min(...vals), Math.min(...vals)) - 1;
  const max = Math.max(...vals) + 1;
  const range = max - min;

  const w = 432, h = 100, padX = 0, padY = 8;
  const chartW = w - padX * 2, chartH = h - padY * 2;

  const pts = vals.map((v, i) => {
    const x = padX + (i / (vals.length - 1)) * chartW;
    const y = padY + ((max - v) / range) * chartH;
    return { x, y };
  });

  // Gradient fill path
  const pathD = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${p.x},${p.y}`).join(' ');
  const fillD = pathD + ` L${pts[pts.length-1].x},${h} L${pts[0].x},${h} Z`;

  // Target line
  const targetY = padY + ((max - (target || 188)) / range) * chartH;

  // Current dot
  const last = pts[pts.length - 1];

  container.innerHTML = `
    <svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <defs>
        <linearGradient id="fill-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="var(--green)" stop-opacity="0.12"/>
          <stop offset="100%" stop-color="var(--green)" stop-opacity="0.01"/>
        </linearGradient>
      </defs>
      <path d="${fillD}" fill="url(#fill-grad)" />
      <line x1="${padX}" y1="${targetY}" x2="${w-padX}" y2="${targetY}"
        stroke="var(--text-muted)" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>
      <text x="${w-padX-2}" y="${targetY - 4}" font-size="9" fill="var(--text-muted)"
        font-family="var(--mono)" text-anchor="end">${target || 188} goal</text>
      <path d="${pathD}" fill="none" stroke="var(--green)" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="${last.x}" cy="${last.y}" r="4" fill="var(--green)" stroke="var(--surface)" stroke-width="2"/>
      <text x="${last.x - 6}" y="${last.y - 10}" font-size="10" fill="var(--text)"
        font-family="var(--mono)" font-weight="500">${vals[vals.length-1]}</text>
    </svg>
  `;
}

function renderCoachSignal(signals) {
  if (!signals || !signals.length) return;
  const el = document.getElementById('coach-signal');
  const s = signals[0];
  const icons = { warning: '\u26A0', critical: '\u2757', positive: '\u2705', neutral: '\u2139' };
  el.innerHTML = `
    <div class="coach-signal severity-${s.severity} anim">
      <div class="icon">${icons[s.severity] || '\u2139'}</div>
      <div class="content"><strong>${s.title}</strong><br>${s.body}</div>
    </div>
  `;
}

function renderNutrition(nutrition, targetEl) {
  if (!nutrition || !nutrition.today_totals) return;
  const totals = nutrition.today_totals;
  const remaining = nutrition.remaining;
  const proteinTarget = totals.protein_g + (remaining ? remaining.protein_g : 0);
  const pct = proteinTarget > 0 ? Math.min(100, (totals.protein_g / proteinTarget) * 100) : 0;
  const barColor = pct >= 80 ? 'var(--green)' : pct >= 50 ? 'var(--accent)' : 'var(--coral)';

  let remainText = '';
  if (remaining && remaining.protein_g > 0) {
    remainText = `${remaining.protein_g.toFixed(0)}g to go`;
  } else if (remaining && remaining.protein_g <= 0) {
    remainText = 'Target hit';
  }

  const meals = nutrition.meals || [];
  const mealHtml = meals.length > 0 ? `
    <ul class="meals-list">
      ${meals.map(m => `<li><span>${m.description}</span><span class="p">${m.protein_g.toFixed(0)}g</span></li>`).join('')}
    </ul>
  ` : '';

  targetEl.innerHTML = `
    <div class="section anim">
      <div class="section-header">Fuel today</div>
      <div class="nutrition-card">
        <div class="protein-row">
          <span class="label">Protein ${remainText ? '(' + remainText + ')' : ''}</span>
          <span class="value">${totals.protein_g.toFixed(0)}g / ${proteinTarget.toFixed(0)}g</span>
        </div>
        <div class="protein-bar">
          <div class="protein-bar-fill" style="width:${pct}%; background:${barColor};"></div>
        </div>
        <div class="macro-row">
          <div><div class="val">${totals.calories ? totals.calories.toFixed(0) : '0'}</div><div class="lbl">calories</div></div>
          <div><div class="val">${totals.carbs_g ? totals.carbs_g.toFixed(0) : '0'}g</div><div class="lbl">carbs</div></div>
          <div><div class="val">${totals.fat_g ? totals.fat_g.toFixed(0) : '0'}g</div><div class="lbl">fat</div></div>
        </div>
        ${mealHtml}
      </div>
    </div>
  `;
}

function renderRecovery(garmin, garminDaily, targetEl) {
  if (!garmin) return;

  let rhrTrend = '', hrvTrend = '';
  if (garminDaily && garminDaily.length > 14) {
    const rhrVals = garminDaily.filter(d => d.rhr).map(d => d.rhr);
    if (rhrVals.length > 14) {
      const early = rhrVals.slice(0, 14).reduce((a,b) => a+b) / 14;
      const late = rhrVals.slice(-14).reduce((a,b) => a+b) / 14;
      const cls = late <= early ? 'trend-good' : 'trend-warn';
      rhrTrend = `<div class="trend ${cls}">${early.toFixed(0)} \u2192 ${late.toFixed(0)}</div>`;
    }
    const hrvVals = garminDaily.filter(d => d.hrv).map(d => d.hrv);
    if (hrvVals.length > 14) {
      const early = hrvVals.slice(0, 14).reduce((a,b) => a+b) / 14;
      const late = hrvVals.slice(-14).reduce((a,b) => a+b) / 14;
      const cls = late >= early ? 'trend-good' : 'trend-warn';
      hrvTrend = `<div class="trend ${cls}">${early.toFixed(0)} \u2192 ${late.toFixed(0)}</div>`;
    }
  }

  const sleepColor = garmin.sleep_duration_avg >= 7 ? 'trend-good' : 'trend-warn';
  const sleepNote = garmin.sleep_duration_avg >= 7 ? 'On target' : 'Below 7hr target';

  function spark(data, color) {
    if (!data || data.length < 3) return '';
    const vals = data.filter(v => v != null);
    if (vals.length < 3) return '';
    const mn = Math.min(...vals), mx = Math.max(...vals), rng = mx - mn || 1;
    const w = 80, h = 24;
    const pts = vals.map((v,i) => `${(i/(vals.length-1))*w},${2+((mx-v)/rng)*(h-4)}`);
    return `<div class="spark"><svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}">
      <polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="1.5"
        stroke-linecap="round" stroke-linejoin="round"/>
    </svg></div>`;
  }

  const rhrSpark = garminDaily ? spark(garminDaily.map(d=>d.rhr), 'var(--text-muted)') : '';
  const hrvSpark = garminDaily ? spark(garminDaily.map(d=>d.hrv), 'var(--green)') : '';

  targetEl.innerHTML = `
    <div class="section anim">
      <div class="section-header">Recovery</div>
      <div class="recovery-grid">
        <div class="recovery-card">
          <div class="label">RHR</div>
          <div class="value">${garmin.resting_hr}<span class="unit"> bpm</span></div>
          ${rhrTrend}${rhrSpark}
        </div>
        <div class="recovery-card">
          <div class="label">HRV</div>
          <div class="value">${garmin.hrv_rmssd_avg}<span class="unit"> ms</span></div>
          ${hrvTrend}${hrvSpark}
        </div>
        <div class="recovery-card">
          <div class="label">Sleep</div>
          <div class="value">${garmin.sleep_duration_avg}<span class="unit"> hrs</span></div>
          <div class="trend ${sleepColor}">${sleepNote}</div>
        </div>
      </div>
    </div>
  `;
}

function renderLabs(scoreResults) {
  if (!scoreResults) return;
  const labs = scoreResults.filter(r =>
    r.has_data && r.clinical_zone && r.value !== null &&
    !['Daily Steps','Resting Heart Rate','HRV (7-day avg)','Sleep Regularity','Weight Trends','Zone 2 Cardio'].includes(r.name)
  );
  if (!labs.length) return;

  const el = document.getElementById('labs-section');
  const zc = { Optimal:'zone-optimal', Healthy:'zone-healthy', Borderline:'zone-borderline', Elevated:'zone-elevated' };
  const rows = labs.map(l => {
    const cls = zc[l.clinical_zone] || 'zone-healthy';
    const date = l.observed_date ? new Date(l.observed_date+'T00:00:00').toLocaleDateString('en-US',{month:'short',year:'2-digit'}) : '';
    return `<tr><td>${l.name}</td><td class="lab-value">${l.value} <span style="font-size:0.68rem;color:var(--text-muted);">${l.unit}</span></td><td>${date}</td><td><span class="zone-badge ${cls}">${l.clinical_zone}</span></td></tr>`;
  }).join('');

  el.innerHTML = `
    <div class="section anim">
      <div class="section-header">Your numbers</div>
      <details class="labs-card">
        <summary>${labs.length} lab results</summary>
        <table class="labs-table">
          <thead><tr><th>Biomarker</th><th>Value</th><th>Date</th><th>Zone</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </details>
    </div>
  `;
}

function renderCoverage(score) {
  if (!score) return;
  const el = document.getElementById('coverage-section');
  const pct = score.coverage;
  const circ = 2 * Math.PI * 28;
  const filled = (pct / 100) * circ;

  el.innerHTML = `
    <div class="section anim">
      <div class="section-header">Health picture</div>
      <div class="coverage-card">
        <div class="coverage-ring">
          <svg viewBox="0 0 72 72" width="72" height="72">
            <circle cx="36" cy="36" r="28" fill="none" stroke="#eae8e3" stroke-width="4"/>
            <circle cx="36" cy="36" r="28" fill="none" stroke="var(--green)" stroke-width="4"
              stroke-linecap="round" stroke-dasharray="${filled} ${circ}"
              transform="rotate(-90 36 36)"/>
          </svg>
          <div class="ring-num">${pct}%</div>
        </div>
        <div class="coverage-text">
          <strong>${score.results ? score.results.length : 0} biomarkers</strong> tracked.
          ${score.gap_count > 0 ? score.gap_count + ' left to measure.' : 'Full coverage.'}
        </div>
      </div>
    </div>
  `;
}

function toggleMore() {
  const el = document.getElementById('more-sections');
  const btn = document.querySelector('.more-toggle button');
  el.classList.toggle('visible');
  btn.textContent = el.classList.contains('visible') ? 'Show less' : 'See full picture';
}

async function init() {
  try {
    const [briefing, garminDaily, weightHistory] = await Promise.all([
      fetch('../data/briefing.json').then(r => r.ok ? r.json() : Promise.reject('No data')),
      fetch('../data/garmin_daily.json').then(r => r.ok ? r.json() : null).catch(() => null),
      fetch('../data/weight_log.csv').then(r => r.ok ? r.text() : null).catch(() => null)
    ]);

    const b = briefing;
    const outcome = b.outcomes ? b.outcomes.primary : null;
    const cfg = outcome ? OUTCOME_CONFIG[outcome] : null;

    // Parse weight CSV
    let wHistory = [];
    if (weightHistory) {
      const lines = weightHistory.trim().split('\n').slice(1);
      wHistory = lines.map(l => {
        const [date, weight] = l.split(',');
        return { date, weight: parseFloat(weight) };
      }).filter(d => !isNaN(d.weight));
    }

    // Date
    if (b.as_of) document.getElementById('date-display').textContent = formatDate(b.as_of);

    // Outcome badge
    if (outcome) renderOutcomeBadge(outcome);

    // Progress hero (weight journey for body comp outcomes)
    if (b.weight) {
      b.weight.start_weight = wHistory.length > 0 ? wHistory[0].weight : 203;
      renderProgressHero(b.weight, outcome || 'lose-weight');
      renderWeightChart(wHistory, b.weight.target || 188);
    }

    // Coach signal
    renderCoachSignal(b.coaching_signals);

    // Sections ordered by outcome
    const primaryEl = document.getElementById('primary-section');
    const secondaryEl = document.getElementById('secondary-section');
    const tertiaryEl = document.getElementById('tertiary-section');

    const renderMap = {
      nutrition: (el) => renderNutrition(b.nutrition, el),
      recovery: (el) => renderRecovery(b.garmin, garminDaily, el),
    };

    if (cfg) {
      if (renderMap[cfg.primary]) renderMap[cfg.primary](primaryEl);
      if (renderMap[cfg.secondary]) renderMap[cfg.secondary](secondaryEl);
    } else {
      renderNutrition(b.nutrition, primaryEl);
      renderRecovery(b.garmin, garminDaily, secondaryEl);
    }

    // More sections
    const hasLabs = b.score && b.score.results && b.score.results.some(r =>
      r.has_data && r.clinical_zone && !['Daily Steps','Resting Heart Rate','HRV (7-day avg)','Sleep Regularity','Weight Trends','Zone 2 Cardio'].includes(r.name)
    );
    if (hasLabs || b.score) {
      document.getElementById('more-toggle').style.display = '';
      renderLabs(b.score.results);
      renderCoverage(b.score);
    }

  } catch (e) {
    document.getElementById('error-display').innerHTML = `
      <div class="empty-state">
        <p>Your health picture is not set up yet.</p>
        <p class="cta">Text your coach to get started. It takes about 5 minutes.</p>
      </div>
    `;
  }
}

init();
</script>
</body>
</html>
