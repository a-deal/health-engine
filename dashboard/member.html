<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Health Picture — baseline.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --border: #ddd9d0;
  --border-light: #e8e5dd;
  --text: #1a1a18;
  --text-secondary: #4a4a44;
  --text-muted: #8a8a80;
  --accent: #c17817;
  --accent-dim: rgba(193, 120, 23, 0.07);
  --green: #2d6a4f;
  --green-dim: rgba(45, 106, 79, 0.06);
  --coral: #b84233;
  --coral-dim: rgba(184, 66, 51, 0.06);
  --font-display: 'Source Serif 4', Georgia, serif;
  --font-body: 'DM Sans', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  padding: 0 0 60px;
}

.page {
  max-width: 540px;
  margin: 0 auto;
  padding: 0 20px;
}

/* ── Header ── */
.header {
  padding: 40px 0 32px;
  text-align: center;
}

.header .logo {
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text-muted);
  letter-spacing: -0.3px;
  margin-bottom: 16px;
}

.header .logo span { color: var(--accent); }

.header h1 {
  font-family: var(--font-display);
  font-size: 1.6rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 4px;
}

.header .date {
  font-size: 0.82rem;
  color: var(--text-muted);
}

/* ── Coverage ring ── */
.coverage-hero {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: 16px;
  padding: 28px;
  display: flex;
  align-items: center;
  gap: 24px;
  margin-bottom: 16px;
}

.coverage-ring-wrap {
  position: relative;
  width: 100px;
  height: 100px;
  flex-shrink: 0;
}

.coverage-ring-wrap .ring-label {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

.ring-number {
  font-family: var(--font-mono);
  font-size: 1.5rem;
  font-weight: 500;
  color: var(--text);
  line-height: 1;
}

.ring-unit {
  font-size: 0.65rem;
  color: var(--text-muted);
  margin-top: 2px;
}

.coverage-text h2 {
  font-family: var(--font-display);
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
}

.coverage-text p {
  font-size: 0.85rem;
  color: var(--text-secondary);
  line-height: 1.5;
}

/* ── Coach signal callout ── */
.coach-signal {
  border-radius: 14px;
  padding: 18px 22px;
  margin-bottom: 24px;
  font-size: 0.92rem;
  line-height: 1.55;
}

.coach-signal.severity-warning {
  background: var(--accent-dim);
  border-left: 3px solid var(--accent);
  color: var(--text-secondary);
}

.coach-signal.severity-positive {
  background: var(--green-dim);
  border-left: 3px solid var(--green);
  color: var(--text-secondary);
}

.coach-signal.severity-critical {
  background: var(--coral-dim);
  border-left: 3px solid var(--coral);
  color: var(--text-secondary);
}

.coach-signal.severity-neutral {
  background: var(--surface);
  border: 1px solid var(--border-light);
  color: var(--text-secondary);
}

.coach-signal strong {
  color: var(--text);
  font-weight: 600;
}

/* ── Section ── */
.section {
  margin-bottom: 28px;
}

.section-title {
  font-family: var(--font-body);
  font-size: 0.75rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--text-muted);
  margin-bottom: 12px;
}

/* ── Focus cards (What Matters Now) ── */
.focus-cards {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.focus-card {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: 12px;
  padding: 18px 20px;
  border-left: 3px solid var(--text-muted);
}

.focus-card.severity-warning { border-left-color: var(--accent); }
.focus-card.severity-positive { border-left-color: var(--green); }
.focus-card.severity-critical { border-left-color: var(--coral); }

.focus-card h4 {
  font-family: var(--font-display);
  font-size: 1rem;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
}

.focus-card p {
  font-size: 0.85rem;
  color: var(--text-secondary);
  line-height: 1.55;
}

/* ── Recovery grid ── */
.recovery-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
}

.recovery-card {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: 12px;
  padding: 18px 16px;
  text-align: center;
}

.recovery-card .label {
  font-size: 0.7rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.recovery-card .value {
  font-family: var(--font-mono);
  font-size: 1.4rem;
  font-weight: 500;
  color: var(--text);
  line-height: 1;
}

.recovery-card .unit {
  font-size: 0.72rem;
  color: var(--text-muted);
  font-weight: 400;
}

.recovery-card .trend {
  font-family: var(--font-mono);
  font-size: 0.68rem;
  margin-top: 6px;
  line-height: 1.3;
}

.trend-good { color: var(--green); }
.trend-warn { color: var(--accent); }
.trend-bad { color: var(--coral); }

.recovery-card .sparkline-wrap {
  margin-top: 8px;
}

/* ── Body comp ── */
.weight-strip {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
}

.weight-card {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: 12px;
  padding: 18px 16px;
  text-align: center;
}

.weight-card .label {
  font-size: 0.7rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  color: var(--text-muted);
  margin-bottom: 8px;
}

.weight-card .value {
  font-family: var(--font-mono);
  font-size: 1.3rem;
  font-weight: 500;
  color: var(--text);
  line-height: 1;
}

.weight-card .unit {
  font-size: 0.72rem;
  color: var(--text-muted);
}

.weight-chart-wrap {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: 12px;
  padding: 18px 20px;
  margin-top: 10px;
}

.weight-chart-wrap .label {
  font-size: 0.7rem;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  color: var(--text-muted);
  margin-bottom: 10px;
}

/* ── Nutrition ── */
.nutrition-strip {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: 12px;
  padding: 20px;
}

.nutrition-protein {
  margin-bottom: 16px;
}

.nutrition-protein .protein-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 8px;
}

.nutrition-protein .protein-header .label {
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text-secondary);
}

.nutrition-protein .protein-header .value {
  font-family: var(--font-mono);
  font-size: 0.85rem;
  color: var(--text);
}

.protein-bar-track {
  height: 8px;
  background: var(--bg);
  border-radius: 4px;
  overflow: hidden;
}

.protein-bar-fill {
  height: 100%;
  background: var(--green);
  border-radius: 4px;
  transition: width 0.8s ease;
}

.nutrition-meals {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.nutrition-meals li {
  font-size: 0.82rem;
  color: var(--text-secondary);
  display: flex;
  justify-content: space-between;
  padding: 4px 0;
  border-bottom: 1px solid var(--border-light);
}

.nutrition-meals li:last-child { border-bottom: none; }

.nutrition-meals .meal-protein {
  font-family: var(--font-mono);
  font-size: 0.78rem;
  color: var(--text-muted);
}

/* ── Labs (collapsible) ── */
.labs-toggle {
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: 12px;
  overflow: hidden;
}

.labs-toggle summary {
  padding: 16px 20px;
  cursor: pointer;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--text-secondary);
  list-style: none;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.labs-toggle summary::-webkit-details-marker { display: none; }

.labs-toggle summary::after {
  content: '+';
  font-family: var(--font-mono);
  font-size: 1rem;
  color: var(--text-muted);
  transition: transform 0.2s;
}

.labs-toggle[open] summary::after {
  content: '\2212';
}

.labs-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.82rem;
}

.labs-table th {
  text-align: left;
  padding: 8px 20px;
  font-weight: 500;
  color: var(--text-muted);
  font-size: 0.72rem;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  border-bottom: 1px solid var(--border-light);
}

.labs-table td {
  padding: 10px 20px;
  border-bottom: 1px solid var(--border-light);
  color: var(--text-secondary);
}

.labs-table tr:last-child td { border-bottom: none; }

.labs-table .lab-value {
  font-family: var(--font-mono);
  font-size: 0.82rem;
  color: var(--text);
}

.zone-badge {
  display: inline-block;
  font-family: var(--font-mono);
  font-size: 0.65rem;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}

.zone-optimal { color: var(--green); background: var(--green-dim); }
.zone-healthy { color: var(--text-secondary); background: #f0efeb; }
.zone-borderline { color: var(--accent); background: var(--accent-dim); }
.zone-elevated { color: var(--coral); background: var(--coral-dim); }

/* ── Empty state ── */
.empty-state {
  text-align: center;
  padding: 32px 20px;
  color: var(--text-muted);
  font-size: 0.9rem;
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: 12px;
}

.empty-state p { margin-bottom: 4px; }
.empty-state .hint { font-size: 0.8rem; }

/* ── Animations ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.animate-in {
  animation: fadeUp 0.4s ease both;
}

/* ── Responsive ── */
@media (max-width: 400px) {
  .recovery-grid { grid-template-columns: 1fr; }
  .weight-strip { grid-template-columns: 1fr; }
  .coverage-hero { flex-direction: column; text-align: center; }
}
</style>
</head>
<body>

<div class="page">
  <div class="header">
    <div class="logo">baseline<span>.</span></div>
    <h1>The other 23 hours</h1>
    <div class="date" id="date-display"></div>
  </div>

  <div id="coverage-section"></div>
  <div id="coach-signal-section"></div>

  <div class="section" id="focus-section" style="display:none;">
    <div class="section-title">What matters now</div>
    <div class="focus-cards" id="focus-cards"></div>
  </div>

  <div class="section" id="recovery-section" style="display:none;">
    <div class="section-title">The other 23 hours</div>
    <div class="recovery-grid" id="recovery-grid"></div>
  </div>

  <div class="section" id="weight-section" style="display:none;">
    <div class="section-title">Body comp</div>
    <div id="weight-content"></div>
  </div>

  <div class="section" id="nutrition-section" style="display:none;">
    <div class="section-title">Fuel today</div>
    <div id="nutrition-content"></div>
  </div>

  <div class="section" id="labs-section" style="display:none;">
    <div class="section-title">Your numbers</div>
    <div id="labs-content"></div>
  </div>

  <div id="error-display"></div>
</div>

<script>
function formatDate(s) {
  return new Date(s + 'T00:00:00').toLocaleDateString('en-US', {
    weekday: 'long', month: 'long', day: 'numeric', year: 'numeric'
  });
}

function renderCoverage(score) {
  const el = document.getElementById('coverage-section');
  const pct = score.coverage;
  const circ = 2 * Math.PI * 42;
  const filled = (pct / 100) * circ;
  const gapCount = score.gap_count;
  const topGap = score.top_gaps && score.top_gaps[0];

  let desc = `${score.results.length} biomarkers tracked.`;
  if (gapCount > 0) desc += ` ${gapCount} left to measure.`;
  if (topGap) desc += ` Easiest next: ${topGap.name}.`;

  el.innerHTML = `
    <div class="coverage-hero animate-in">
      <div class="coverage-ring-wrap">
        <svg viewBox="0 0 100 100" width="100" height="100">
          <circle cx="50" cy="50" r="42" fill="none" stroke="#e8e5dd" stroke-width="5" />
          <circle cx="50" cy="50" r="42" fill="none" stroke="var(--green)" stroke-width="5"
            stroke-linecap="round" stroke-dasharray="${filled} ${circ}"
            transform="rotate(-90 50 50)" style="transition: stroke-dasharray 1s ease;" />
        </svg>
        <div class="ring-label">
          <div class="ring-number">${pct}%</div>
          <div class="ring-unit">covered</div>
        </div>
      </div>
      <div class="coverage-text">
        <h2>Health picture</h2>
        <p>${desc}</p>
      </div>
    </div>
  `;
}

function renderCoachSignal(signals) {
  const el = document.getElementById('coach-signal-section');
  if (!signals || !signals.length) return;
  const top = signals[0];
  el.innerHTML = `
    <div class="coach-signal severity-${top.severity} animate-in">
      <strong>${top.title}</strong><br>${top.body}
    </div>
  `;
}

function renderFocus(insights, signals) {
  const items = [];
  // Top coaching signals first
  if (signals) {
    signals.slice(0, 2).forEach(s => items.push({
      severity: s.severity || 'warning',
      title: s.title,
      body: s.body
    }));
  }
  // Then top insights (avoid duplicates by title)
  const usedTitles = new Set(items.map(i => i.title));
  if (insights) {
    insights
      .filter(i => i.severity === 'warning' || i.severity === 'critical')
      .filter(i => !usedTitles.has(i.title))
      .slice(0, 3 - items.length)
      .forEach(i => items.push(i));
  }

  if (!items.length) return;

  const section = document.getElementById('focus-section');
  section.style.display = '';
  const container = document.getElementById('focus-cards');
  container.innerHTML = items.map(i => `
    <div class="focus-card severity-${i.severity}">
      <h4>${i.title}</h4>
      <p>${i.body}</p>
    </div>
  `).join('');
}

function renderRecovery(garmin, garminDaily) {
  if (!garmin) return;

  const section = document.getElementById('recovery-section');
  section.style.display = '';
  const grid = document.getElementById('recovery-grid');

  // Calculate trends from daily data
  let rhrTrend = '', hrvTrend = '', sleepTrend = '';
  if (garminDaily && garminDaily.length > 14) {
    const rhrVals = garminDaily.filter(d => d.rhr).map(d => d.rhr);
    if (rhrVals.length > 14) {
      const early = rhrVals.slice(0, 14).reduce((a, b) => a + b) / 14;
      const late = rhrVals.slice(-14).reduce((a, b) => a + b) / 14;
      const diff = (late - early).toFixed(1);
      const cls = diff <= 0 ? 'trend-good' : 'trend-warn';
      rhrTrend = `<div class="trend ${cls}">${early.toFixed(0)} \u2192 ${late.toFixed(0)}</div>`;
    }
    const hrvVals = garminDaily.filter(d => d.hrv).map(d => d.hrv);
    if (hrvVals.length > 14) {
      const early = hrvVals.slice(0, 14).reduce((a, b) => a + b) / 14;
      const late = hrvVals.slice(-14).reduce((a, b) => a + b) / 14;
      const diff = (late - early).toFixed(1);
      const cls = diff >= 0 ? 'trend-good' : 'trend-warn';
      hrvTrend = `<div class="trend ${cls}">${early.toFixed(0)} \u2192 ${late.toFixed(0)}</div>`;
    }
  }

  const sleepColor = garmin.sleep_duration_avg >= 7 ? 'trend-good' : 'trend-warn';
  sleepTrend = `<div class="trend ${sleepColor}">${garmin.sleep_duration_avg >= 7 ? 'On target' : 'Below 7hr target'}</div>`;

  function miniSparkline(data, color) {
    if (!data || data.length < 3) return '';
    const vals = data.filter(v => v !== null && v !== undefined);
    if (vals.length < 3) return '';
    const min = Math.min(...vals), max = Math.max(...vals);
    const range = max - min || 1;
    const w = 100, h = 28, pad = 3;
    const pts = vals.map((v, i) =>
      `${(i / (vals.length - 1)) * w},${pad + ((max - v) / range) * (h - pad * 2)}`
    );
    return `<div class="sparkline-wrap">
      <svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" style="display:block;">
        <polyline points="${pts.join(' ')}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>`;
  }

  const rhrSpark = garminDaily ? miniSparkline(garminDaily.map(d => d.rhr), 'var(--text-muted)') : '';
  const hrvSpark = garminDaily ? miniSparkline(garminDaily.map(d => d.hrv), 'var(--green)') : '';

  grid.innerHTML = `
    <div class="recovery-card animate-in">
      <div class="label">Resting HR</div>
      <div class="value">${garmin.resting_hr}<span class="unit"> bpm</span></div>
      ${rhrTrend}${rhrSpark}
    </div>
    <div class="recovery-card animate-in" style="animation-delay:0.05s;">
      <div class="label">HRV</div>
      <div class="value">${garmin.hrv_rmssd_avg}<span class="unit"> ms</span></div>
      ${hrvTrend}${hrvSpark}
    </div>
    <div class="recovery-card animate-in" style="animation-delay:0.1s;">
      <div class="label">Sleep</div>
      <div class="value">${garmin.sleep_duration_avg}<span class="unit"> hrs</span></div>
      ${sleepTrend}
    </div>
  `;
}

function renderWeight(weight) {
  if (!weight || !weight.current) return;

  const section = document.getElementById('weight-section');
  section.style.display = '';
  const container = document.getElementById('weight-content');

  const avg = weight.rolling_avg_7d || weight.current;
  const rate = weight.weekly_rate;
  let rateText = '', rateCls = '';
  if (rate !== undefined && rate !== null) {
    const dir = rate < 0 ? '\u2193' : rate > 0 ? '\u2191' : '\u2192';
    rateText = `${dir} ${Math.abs(rate).toFixed(1)} lbs/wk`;
    rateCls = rate <= 0 ? 'trend-good' : 'trend-warn';
  }

  container.innerHTML = `
    <div class="weight-strip">
      <div class="weight-card animate-in">
        <div class="label">Current</div>
        <div class="value">${weight.current}<span class="unit"> lbs</span></div>
      </div>
      <div class="weight-card animate-in" style="animation-delay:0.05s;">
        <div class="label">7-day avg</div>
        <div class="value">${avg.toFixed(1)}<span class="unit"> lbs</span></div>
      </div>
      <div class="weight-card animate-in" style="animation-delay:0.1s;">
        <div class="label">Trend</div>
        <div class="value" style="font-size:1rem;">
          <span class="${rateCls}">${rateText || 'N/A'}</span>
        </div>
      </div>
    </div>
  `;
}

function renderNutrition(nutrition) {
  if (!nutrition || !nutrition.today_totals) return;

  const section = document.getElementById('nutrition-section');
  section.style.display = '';
  const container = document.getElementById('nutrition-content');

  const totals = nutrition.today_totals;
  const remaining = nutrition.remaining;
  const proteinTarget = totals.protein_g + (remaining ? remaining.protein_g : 0);
  const proteinPct = proteinTarget > 0 ? Math.min(100, (totals.protein_g / proteinTarget) * 100) : 0;
  const barColor = proteinPct >= 80 ? 'var(--green)' : proteinPct >= 50 ? 'var(--accent)' : 'var(--coral)';

  let remainingText = '';
  if (remaining && remaining.protein_g > 0) {
    remainingText = `${remaining.protein_g.toFixed(0)}g protein remaining`;
  } else if (remaining && remaining.protein_g <= 0) {
    remainingText = 'Protein target hit';
  }

  container.innerHTML = `
    <div class="nutrition-strip animate-in">
      <div class="nutrition-protein">
        <div class="protein-header">
          <span class="label">Protein</span>
          <span class="value">${totals.protein_g.toFixed(0)}g / ${proteinTarget.toFixed(0)}g</span>
        </div>
        <div class="protein-bar-track">
          <div class="protein-bar-fill" style="width: ${proteinPct}%; background: ${barColor};"></div>
        </div>
        ${remainingText ? `<div style="font-size:0.78rem; color:var(--text-muted); margin-top:6px;">${remainingText}</div>` : ''}
      </div>
      <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:12px; text-align:center; padding-top:12px; border-top:1px solid var(--border-light);">
        <div>
          <div style="font-family:var(--font-mono); font-size:0.9rem; color:var(--text);">${totals.calories ? totals.calories.toFixed(0) : '0'}</div>
          <div style="font-size:0.7rem; color:var(--text-muted);">calories</div>
        </div>
        <div>
          <div style="font-family:var(--font-mono); font-size:0.9rem; color:var(--text);">${totals.carbs_g ? totals.carbs_g.toFixed(0) : '0'}g</div>
          <div style="font-size:0.7rem; color:var(--text-muted);">carbs</div>
        </div>
        <div>
          <div style="font-family:var(--font-mono); font-size:0.9rem; color:var(--text);">${totals.fat_g ? totals.fat_g.toFixed(0) : '0'}g</div>
          <div style="font-size:0.7rem; color:var(--text-muted);">fat</div>
        </div>
      </div>
    </div>
  `;
}

function renderLabs(scoreResults) {
  if (!scoreResults) return;

  // Filter to only lab-based results with clinical zones
  const labs = scoreResults.filter(r =>
    r.has_data && r.clinical_zone && r.value !== null &&
    !['Daily Steps', 'Resting Heart Rate', 'HRV (7-day avg)', 'Sleep Regularity', 'Weight Trends', 'Zone 2 Cardio'].includes(r.name)
  );

  if (!labs.length) return;

  const section = document.getElementById('labs-section');
  section.style.display = '';
  const container = document.getElementById('labs-content');

  const zoneClass = {
    'Optimal': 'zone-optimal',
    'Healthy': 'zone-healthy',
    'Borderline': 'zone-borderline',
    'Elevated': 'zone-elevated'
  };

  const rows = labs.map(l => {
    const cls = zoneClass[l.clinical_zone] || 'zone-healthy';
    const date = l.observed_date
      ? new Date(l.observed_date + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', year: '2-digit' })
      : '';
    return `<tr>
      <td>${l.name}</td>
      <td class="lab-value">${l.value} <span style="font-size:0.7rem;color:var(--text-muted);">${l.unit}</span></td>
      <td style="font-size:0.75rem;color:var(--text-muted);">${date}</td>
      <td><span class="zone-badge ${cls}">${l.clinical_zone}</span></td>
    </tr>`;
  }).join('');

  container.innerHTML = `
    <details class="labs-toggle animate-in">
      <summary>View ${labs.length} lab results</summary>
      <table class="labs-table">
        <thead>
          <tr>
            <th>Biomarker</th>
            <th>Value</th>
            <th>Date</th>
            <th>Zone</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </details>
  `;
}

async function init() {
  try {
    const responses = await Promise.all([
      fetch('../data/briefing.json').then(r => r.ok ? r.json() : Promise.reject(new Error('No briefing data found'))),
      fetch('../data/garmin_daily.json').then(r => r.ok ? r.json() : null).catch(() => null)
    ]);

    const b = responses[0];
    const garminDaily = responses[1];

    // Date
    if (b.as_of) {
      document.getElementById('date-display').textContent = formatDate(b.as_of);
    }

    // Coverage
    if (b.score) renderCoverage(b.score);

    // Coach signal (top one only)
    renderCoachSignal(b.coaching_signals);

    // What matters now
    renderFocus(b.insights, b.coaching_signals);

    // Recovery
    renderRecovery(b.garmin, garminDaily);

    // Weight
    renderWeight(b.weight);

    // Nutrition
    renderNutrition(b.nutrition);

    // Labs
    if (b.score && b.score.results) renderLabs(b.score.results);

  } catch (e) {
    document.getElementById('error-display').innerHTML = `
      <div class="empty-state">
        <p>Your health picture hasn't been set up yet.</p>
        <p class="hint">Text your coach to get started. It takes about 5 minutes.</p>
      </div>
    `;
  }
}

init();
</script>

</body>
</html>
